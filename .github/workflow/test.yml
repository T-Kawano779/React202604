name: Vitest CI

on:
  push:
    branches: [ "main" ] # 対象ブランチ
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # プロジェクトのNodeバージョンに合わせて変更
          cache: 'npm'       # npm, yarn, pnpm などに合わせてキャッシュを有効化

      - name: Install dependencies
        run: npm ci

      - name: Run Tests
        run: npx vitest run # ウォッチモードではなく1回のみ実行

      - name: Run Tests with Coverage
        run: npm run test:coverage # カバレッジレポートも生成