name: Vitest CI

on:
  push:
    branches: [ "main" ] # 対象ブランチ
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env: # VitestをNode.js 24で実行するための環境変数
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # プロジェクトのNodeバージョンに合わせて変更
          cache: 'npm'       # npm, yarn, pnpm などに合わせてキャッシュを有効化

      - name: Install dependencies
        run: npm ci

      - name: Run Tests with Coverage # Vitestでテストとカバレッジを実行
        #run: npm run test:coverage    # package.jsonにテストとカバレッジのスクリプトが定義されていることを前提
        run: npm run test:coverage    # package.jsonにテストとカバレッジのスクリプトが定義されていることを前提

      - name: Upload coverage report  # VitestのカバレッジレポートをGitHub Actionsのアーティファクトとしてアップロード
        uses: actions/upload-artifact@v4
        with:
          #name: coverage-report # アップロードするアーティファクトの名前
          #path: coverage/       # Vitestのデフォルトのカバレッジ出力先

          name: vitest-combined-results
          path: |
            coverage/
            html/